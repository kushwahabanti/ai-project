<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ad Generator - Pro Edition</title>
  <meta name="description" content="Create stunning ad copy and professional posters instantly with AI. Text ads, slogans, marketing strategies, and poster generation powered by AI.">
  
  <!-- Fonts: Outfit for headers, Inter for body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="./css/style.css?v=3">
  
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Animated Background System -->
  <div class="bg-canvas">
    <!-- Large color orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-orb orb-4"></div>
    <div class="bg-orb orb-5"></div>

    <!-- Floating geometric shapes -->
    <div class="float-shape shape-diamond shape-1"></div>
    <div class="float-shape shape-ring shape-2"></div>
    <div class="float-shape shape-plus shape-3"></div>
    <div class="float-shape shape-diamond shape-4"></div>
    <div class="float-shape shape-triangle shape-5"></div>
    <div class="float-shape shape-ring shape-6"></div>
    <div class="float-shape shape-plus shape-7"></div>
    <div class="float-shape shape-triangle shape-8"></div>

    <!-- Tiny floating particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
    <div class="particle p7"></div>
    <div class="particle p8"></div>
    <div class="particle p9"></div>
    <div class="particle p10"></div>
    <div class="particle p11"></div>
    <div class="particle p12"></div>

    <!-- Grid + gradient mesh overlay -->
    <div class="grid-overlay"></div>
    <div class="gradient-mesh"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">✨</span> AI Ad Generator
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>New Project</span>
      </button>
    </div>

    <div class="chat-history" id="chatHistory">
      <div class="history-section">
        <div class="history-label">Recent Projects</div>
        <div id="recentChats"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="copyright">© 2026 AI Ad Generator Pro</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="container">
      <div class="chat-container">

        <div class="chat" id="chatScroller" style="display: flex; flex-direction: column;">
          <div class="header" style="margin-bottom: 40px; flex-shrink: 0;">
            <div class="title-badge">State-of-the-art Model</div>
            <h1 class="title">AI Advertisement Generator</h1>
            <p class="subtitle">Create stunning ad copy and professional posters instantly</p>
          </div>

          <div id="chat" style="flex: 1; display: flex; flex-direction: column;">
          <div class="empty-state">
            <div class="empty-state-icon-wrapper">
              <div class="empty-state-icon">✨</div>
            </div>
            <h3>Ready to Create?</h3>
            <p>Choose text or poster mode to get started</p>
          </div>
        </div>
      </div>

      <div class="controls-glass">
        <div class="filters-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 15px; flex-wrap: wrap;">
          <!-- Content Type Selector -->
          <div class="content-type-selector" style="margin-bottom: 0;">
            <button class="content-type-btn active" data-type="text">
              <span>📝</span> Text Ad
            </button>
            <button class="content-type-btn" data-type="poster">
              <span>🎨</span> Ad Poster
            </button>
          </div>

          <!-- Chat Stats in the middle -->
          <div class="chat-stats" style="display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <div class="chat-info" style="display: flex; align-items: center; font-size: 13px; font-weight: 500; color: #94a3b8;">
              <span class="chat-icon" style="margin-right: 6px;">💬</span>
              <span class="msg-count-wrapper"><span id="msgCount" style="color: white; font-weight:bold;">0</span> <span class="msgs-label" style="opacity: 0.8; margin-left: 4px;">msgs</span></span>
            </div>
            <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.1);"></div>
            <button class="clear-btn" id="clearBtn" title="Clear Chat History" style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; color: #ef4444; cursor: pointer; transition: all 0.2s; padding:0;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </div>

          <!-- Tone Selector -->
          <div class="tone-selector" style="margin-bottom: 0;">
            <button class="tone-btn active" data-tone="professional">💼 Professional</button>
            <button class="tone-btn" data-tone="casual">😊 Casual</button>
            <button class="tone-btn" data-tone="creative">🎨 Creative</button>
            <button class="tone-btn" data-tone="funny">😄 Funny</button>
          </div>
        </div>

        <!-- Search Box -->
        <div class="search-box" style="align-items: center; padding: 6px;">
          <input id="input" placeholder="Describe your product or campaign here..." maxlength="1000" autocomplete="off" style="padding-left: 12px;" />
          
          <button id="generateBtn" class="generate-btn">
            <span>Generate</span>
            <span class="sparkle">✨</span>
          </button>
        </div>
        <div class="char-count"><span id="charCount">0</span> / 1000</div>

        <!-- Quick Actions -->
        <div class="actions">
          <button class="action-card" data-quick="Generate 3 catchy slogans for ">
            <div class="action-icon-wrapper"><span class="action-icon">⚡</span></div>
            <span>Slogans</span>
          </button>
          <button class="action-card" data-quick="Give 3 marketing strategies for ">
            <div class="action-icon-wrapper"><span class="action-icon">💡</span></div>
            <span>Strategies</span>
          </button>
          <button class="action-card" data-quick="Write a product description for ">
            <div class="action-icon-wrapper"><span class="action-icon">📝</span></div>
            <span>Description</span>
          </button>
          <button class="action-card" data-quick="Create a social media post for ">
            <div class="action-icon-wrapper"><span class="action-icon">📱</span></div>
            <span>Social Post</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- App Script -->
  <script src="./js/app.js?v=3"></script>
</body>
</html>
